# cargo-deny configuration. Checks advisories (RUSTSEC), license compliance,
# banned/duplicate crates, and crate sources.

[advisories]
# Fail on any known security advisory in the dependency tree.
yanked = "deny"

[licenses]
# Licenses permitted in the dependency tree. The Zcash stack is MIT/Apache-2.0;
# a few transitive crates use the other common permissive licenses below.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
]
confidence-threshold = 0.9

[bans]
# Multiple versions of the same crate are common in large dependency trees
# (the Zcash stack pulls several); warn rather than fail.
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
