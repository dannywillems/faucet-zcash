# Signer host stack. The signer is never exposed on a public port; the Worker
# reaches it only through the Cloudflare Tunnel (cloudflared), which connects
# out to Cloudflare. Copy .env.example to .env and fill the secrets first.
#
# The signer syncs and broadcasts through a local zaino (lightwalletd-protocol
# gRPC) backed by zebrad. Run zebra + zaino on the host and point
# LIGHTWALLETD_URL at zaino (reachable from this container via
# host.docker.internal). See README.md.

services:
  signer:
    build:
      context: ..
      dockerfile: signer/Dockerfile
    image: faucet-signer:latest
    restart: unless-stopped
    environment:
      SIGNER_BIND: 0.0.0.0:8080
      SIGNER_SHARED_SECRET: ${SIGNER_SHARED_SECRET:?set SIGNER_SHARED_SECRET in .env}
      SIGNER_SEED: ${SIGNER_SEED:?set SIGNER_SEED in .env}
      LIGHTWALLETD_URL: ${LIGHTWALLETD_URL:-http://host.docker.internal:8137}
      SIGNER_DB_PATH: ${SIGNER_DB_PATH:-/data/faucet-wallet.db}
      FAUCET_NETWORK: testnet
      RUST_LOG: info
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - faucet-data:/data
    expose:
      - "8080"
    networks:
      - faucet

  cloudflared:
    image: cloudflare/cloudflared:2024.12.2
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARED_TUNNEL_TOKEN:?set CLOUDFLARED_TUNNEL_TOKEN in .env}
    depends_on:
      - signer
    networks:
      - faucet

volumes:
  faucet-data:

networks:
  faucet:
    driver: bridge
