name: Changelog checks

on:
  pull_request:
    types: [assigned, opened, synchronize, reopened, labeled, unlabeled]
    branches: [main]

permissions:
  contents: read

jobs:
  check-changelog-entry:
    name: CHANGELOG.md has an entry
    runs-on: ubuntu-latest
    steps:
      # Dependency bumps (Dependabot) do not carry a changelog entry; skip the
      # check for them so the job still reports green. Human PRs are unaffected.
      - uses: tarides/changelog-check-action@v3
        if: ${{ github.actor != 'dependabot[bot]' }}
        with:
          changelog: CHANGELOG.md

  check-changelog-commit:
    name: CHANGELOG.md changes are in a dedicated commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Download toolbox changelog check
        run: |
          curl -sSLO https://raw.githubusercontent.com/dannywillems/toolbox/main/changelog/check-commit.sh
          chmod +x check-commit.sh
      - name: Verify CHANGELOG hygiene
        run: ./check-commit.sh "${{ github.event.pull_request.base.sha }}"
