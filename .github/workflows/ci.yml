name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust ${{ matrix.toolchain }} (fmt, clippy, test, wasm)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, beta]
    env:
      # Override the pinned rust-toolchain.toml so the Makefile's plain `cargo`
      # calls run under the matrix toolchain. RUSTUP_TOOLCHAIN has the highest
      # precedence in rustup, above the toolchain file.
      RUSTUP_TOOLCHAIN: ${{ matrix.toolchain }}
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust (${{ matrix.toolchain }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.toolchain }}
      - name: Check formatting
        run: make check-format
      - name: Clippy (native crates)
        run: make lint
      - name: Clippy (wasm crates)
        run: make lint-wasm
      - name: Test (native)
        run: make test
      - name: Build wasm crates
        run: make build-wasm

  frontend:
    name: Frontend (format, check, build, e2e)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: cargo install wasm-pack --locked
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: make frontend-install
      - name: Check formatting
        run: make frontend-check-format
      - name: Type-check
        run: make frontend-check
      - name: Build
        run: make frontend-build
      - name: Install Playwright browser
        run: cd frontend && npx playwright install --with-deps chromium
      - name: E2E
        run: make frontend-e2e

  deny:
    name: cargo deny (advisories, licenses, bans)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Run cargo deny
        run: make deny
