name: PR hygiene

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read

jobs:
  pr-hygiene:
    name: Commit and PR hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Download toolbox pr-hygiene scripts
        run: |
          base=https://raw.githubusercontent.com/dannywillems/toolbox/main/pr-hygiene
          for s in check-pr-size.sh check-title-length.sh \
                   check-no-fixup.sh check-commit-body.sh; do
            curl -sSLO "$base/$s"
            chmod +x "$s"
          done
      - name: PR size (fail >500 lines, warn >300)
        run: ./check-pr-size.sh "${{ github.event.pull_request.base.sha }}"
      - name: Commit title length (<= 80 chars)
        run: ./check-title-length.sh "${{ github.event.pull_request.base.sha }}"
      - name: No fixup/squash/WIP commits
        run: ./check-no-fixup.sh "${{ github.event.pull_request.base.sha }}"
      - name: Commit body required for large commits
        run: ./check-commit-body.sh "${{ github.event.pull_request.base.sha }}"
