version: 2
updates:
  # Rust workspace (crates.io deps; the git-pinned librustzcash rev is updated
  # manually). Minor/patch grouped to reduce PR noise.
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
    groups:
      cargo-minor-patch:
        update-types:
          - minor
          - patch

  # Frontend (npm).
  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps(frontend)"
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used by the workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"
