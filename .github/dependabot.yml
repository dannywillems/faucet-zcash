version: 2
updates:
  # Rust workspace (crates.io deps; the git-pinned librustzcash rev is updated
  # manually). Minor/patch grouped to reduce PR noise.
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
    ignore:
      # The librustzcash stack pins these (the wallet API takes rand 0.8's
      # OsRng and secrecy 0.8's SecretVec), so their majors cannot be bumped
      # independently. Revisit when librustzcash updates them upstream.
      - dependency-name: "rand"
        update-types: ["version-update:semver-major"]
      - dependency-name: "secrecy"
        update-types: ["version-update:semver-major"]
    groups:
      cargo-minor-patch:
        update-types:
          - minor
          - patch

  # Frontend (npm).
  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps(frontend)"
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used by the workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
    ignore:
      # dtolnay/rust-toolchain's tags are Rust versions, not action releases,
      # so Dependabot bumps it to non-existent future versions (e.g. 1.100.0).
      # The workflows use the @stable / @master moving tags instead.
      - dependency-name: "dtolnay/rust-toolchain"
    groups:
      github-actions:
        patterns:
          - "*"
